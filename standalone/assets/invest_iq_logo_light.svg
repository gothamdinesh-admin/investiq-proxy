<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="500" viewBox="0 0 1600 500" role="img" aria-labelledby="title desc">
<title id="title">Invest IQ logo</title>
<desc id="desc">Invest IQ wordmark with a growth chart icon, designed for light mode.</desc>

<defs>
  <linearGradient id="iconGrad" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%" stop-color="#0B1F3A"/>
    <stop offset="50%" stop-color="#1D4ED8"/>
    <stop offset="100%" stop-color="#10B981"/>
  </linearGradient>
  <linearGradient id="iqGrad" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0%" stop-color="#1D4ED8"/>
    <stop offset="100%" stop-color="#10B981"/>
  </linearGradient>
  <linearGradient id="lineGrad" x1="0" y1="1" x2="1" y2="0">
    <stop offset="0%" stop-color="#22D3EE"/>
    <stop offset="100%" stop-color="#F59E0B"/>
  </linearGradient>
  <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
    <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#020617" flood-opacity="0.22"/>
  </filter>
</defs>

<g transform="translate(64,70) scale(0.35)">

  <g filter="url(#softShadow)">
    <rect x="72" y="72" width="880" height="880" rx="220" fill="url(#iconGrad)"/>
  </g>
  <path d="M232 704 L396 542 L536 608 L792 336" fill="none" stroke="white" stroke-width="58" stroke-linecap="round" stroke-linejoin="round" opacity="0.96"/>
  <path d="M684 336 H792 V444" fill="none" stroke="white" stroke-width="58" stroke-linecap="round" stroke-linejoin="round" opacity="0.96"/>
  <circle cx="396" cy="542" r="46" fill="white" opacity="0.98"/>
  <circle cx="536" cy="608" r="38" fill="white" opacity="0.94"/>
  <circle cx="792" cy="336" r="52" fill="#FCD34D"/>
  <path d="M252 784 H778" stroke="white" stroke-width="34" stroke-linecap="round" opacity="0.22"/>
  <text x="512" y="865" font-family="Inter, Avenir Next, Arial, sans-serif" font-size="124" font-weight="800" text-anchor="middle" fill="white" opacity="0.94">IQ</text>

</g>
<g transform="translate(470,174)">
  <text x="0" y="0" font-family="Inter, Avenir Next, Arial, sans-serif" font-size="128" font-weight="760" letter-spacing="-4" fill="#0B1F3A">Invest</text>
  <text x="418" y="0" font-family="Inter, Avenir Next, Arial, sans-serif" font-size="128" font-weight="860" letter-spacing="-5" fill="url(#iqGrad)">IQ</text>
  <text x="4" y="82" font-family="Inter, Avenir Next, Arial, sans-serif" font-size="38" font-weight="520" letter-spacing="2.5" fill="#475569">INTELLIGENT INVESTING DASHBOARD</text>
  <rect x="4" y="118" width="240" height="8" rx="4" fill="url(#iqGrad)"/>
  <circle cx="274" cy="122" r="8" fill="#F59E0B"/>
</g>
</svg>
